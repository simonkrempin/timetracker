name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer

      - name: Build
        run: make bundle

      - name: Package
        run: |
          cd build
          zip -r TimeTracker.zip TimeTracker.app

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/TimeTracker.zip
          generate_release_notes: true
