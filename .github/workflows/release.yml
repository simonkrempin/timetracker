name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Verify Swift version
        run: swift --version

      - name: Build
        run: make bundle BUILD_CONFIG=release

      - name: Package
        run: |
          cd build
          zip -r TimeTracker.zip TimeTracker.app

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/TimeTracker.zip
          generate_release_notes: true
